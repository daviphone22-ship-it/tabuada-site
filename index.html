<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabuada Rush</title>

<style>
body{
font-family: Arial;
background:#0F172A;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1E293B;
padding:30px;
border-radius:15px;
text-align:center;
width:340px;
}

h1{color:#3B82F6;}

#question{
font-size:42px;
margin:15px;
}

input{
font-size:22px;
padding:8px;
width:120px;
text-align:center;
border-radius:8px;
border:none;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:18px;
background:#3B82F6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.bar{
height:12px;
background:#334155;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.fill{
height:100%;
background:#8B5CF6;
width:0%;
transition:0.3s;
}

.correct{color:#22C55E;}
.wrong{color:#EF4444;}
</style>
</head>

<body>

<div class="container">

<h1>Tabuada Rush</h1>

<div>⏱ Tempo: <span id="timer">300</span></div>
<div>⭐ Nível: <span id="level">1</span></div>
<div>XP: <span id="xp">0</span>/100</div>

<div class="bar"><div class="fill" id="xpBar"></div></div>

<div id="question"></div>

<input type="number" id="answer">
<br>
<button onclick="check()">Confirmar</button>

<p id="result"></p>

</div>

<script>

let time = 300;
let xp = Number(localStorage.getItem("xp")) || 0;
let level = Number(localStorage.getItem("level")) || 1;
let combo = 0;

let n1,n2,correct;

function updateUI(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
document.getElementById("xpBar").style.width=(xp%100)+"%";
}

function newQuestion(){
n1=Math.floor(Math.random()*9)+2;
n2=Math.floor(Math.random()*10)+1;
correct=n1*n2;
document.getElementById("question").innerText=n1+" × "+n2;
}

function check(){

let value=Number(document.getElementById("answer").value);

if(value===correct){

combo++;
let gain=10*combo;

xp+=gain;
time+=1;

document.getElementById("result").innerText=
`Acertou! +${gain} XP (Combo x${combo})`;
document.getElementById("result").className="correct";

if(xp>=level*100){
level++;
document.body.style.background="#1e3a8a";
setTimeout(()=>document.body.style.background="#0F172A",200);
}

}else{
combo=0;
document.getElementById("result").innerText=
`Errado! Era ${correct}`;
document.getElementById("result").className="wrong";
}

localStorage.setItem("xp",xp);
localStorage.setItem("level",level);

document.getElementById("answer").value="";
updateUI();
newQuestion();
}

setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=0){
alert("Fim de jogo!");
location.reload();
}
},1000);

updateUI();
newQuestion();

</script>

</body>
</html>
